version: '3.8'

services:
  # Trading Bot
  trading-bot:
    build: .
    container_name: indodax-trading-bot
    restart: unless-stopped
    volumes:
      - ./storage:/app/storage
      - ./logs:/app/logs
      - ./.env:/app/.env
      - ./config.json:/app/config.json
    environment:
      - PYTHONUNBUFFERED=1
    command: python main.py paper --pairs BTC_IDR,ETH_IDR --timeframe 1h --interval 5
    networks:
      - trading-net
    depends_on:
      - redis

  # Redis for caching
  redis:
    image: redis:7-alpine
    container_name: redis-cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - trading-net
    restart: unless-stopped

networks:
  trading-net:
    driver: bridge

volumes:
  redis_data:
